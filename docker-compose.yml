version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: atalaya-postgres
    environment:
      POSTGRES_USER: atalaya
      POSTGRES_PASSWORD: atalaya_pass
      POSTGRES_DB: atalaya_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atalaya -d atalaya_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: atalaya-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: atalaya-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atalaya-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://atalaya:atalaya_pass@postgres:5432/atalaya_db
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    volumes:
      - evidence_data:/var/atalaya/evidence
      - reports_data:/var/atalaya/reports
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atalaya-worker
    command: python -m app.jobs.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://atalaya:atalaya_pass@postgres:5432/atalaya_db
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    volumes:
      - evidence_data:/var/atalaya/evidence
      - reports_data:/var/atalaya/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atalaya-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  evidence_data:
  reports_data:
