global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "atalaya-intel"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8000"]

  # Métricas clave a exponer:
  # atalaya_intel_jobs_total{discipline="osint", status="success"}
  # atalaya_fusion_correlation_time_seconds
  # atalaya_audit_chain_length

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]

  - job_name: "neo4j"
    static_configs:
      - targets: ["neo4j:7474"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9092"]
